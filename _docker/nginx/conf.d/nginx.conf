server {
    listen 80;
    listen [::]:80;

    # localhost/nginx — чтобы SSR-сервер (контейнер app) достучался до API
    # по http://nginx/api. ДЛЯ ПЕРЕЕЗДА на домен добавь его сюда.
    server_name yourdomain.com localhost 127.0.0.1 nginx;

    root /var/www/public;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    charset utf-8;

    # --- Laravel API + health (php-fpm) ---
    location /api/ {
        try_files $uri $uri/ /index.php?$query_string;
    }
    location = /up {
        try_files $uri /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~ \.php$ {
        fastcgi_pass app:9000;
		fastcgi_index index.php;
		fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
		include fastcgi_params;
    }

    location ~ /\.(?!well-known).* 
	{ 
		deny all; 
	}

    # --- Nuxt SSR (всё остальное) — контейнер app, порт 3000 ---
    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}